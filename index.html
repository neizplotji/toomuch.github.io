<!DOCTYPE html>

<head>
  <meta charset="UTF-8" />

  <title>Had too much?</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #080810;
      color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* ── CANVAS BACKGROUND ── */
    canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      opacity: 0.55;
    }

    /* ── LAYOUT ── */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 48px 36px 48px;
      max-width: 480px;
    }

    /* ── TOP TEXT ── */
    .top {
      margin-bottom: 36px;
      opacity: 0;
      animation: fadeIn 0.8s ease forwards 0.2s;
    }

    .top-eyebrow {
      font-size: 26px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.01em;
      margin-bottom: 20px;
      line-height: 1.25;
    }

    .clock {
      font-size: 36px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.02em;
      line-height: 1;
      margin-bottom: 4px;
    }

    .dateline {
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.01em;
    }

    /* ── NAV LINKS ── */
    .links {
      display: flex;
      flex-direction: column;
      gap: 0;
      margin-top: auto;
      padding-top: 20px;
    }

    .link-item {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 22px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      text-decoration: none;
      cursor: pointer;
      opacity: 0;
    }

    .link-item:first-child { border-top: 1px solid rgba(255,255,255,0.1); }

    .link-item:nth-child(1) { animation: fadeIn 0.6s ease forwards 0.5s; }
    .link-item:nth-child(2) { animation: fadeIn 0.6s ease forwards 0.65s; }
    .link-item:nth-child(3) { animation: fadeIn 0.6s ease forwards 0.8s; }
    .link-item:nth-child(4) { animation: fadeIn 0.6s ease forwards 0.95s; }
    .link-item:nth-child(5) { animation: fadeIn 0.6s ease forwards 1.1s; }

    .link-main {
      font-size: clamp(28px, 8vw, 36px);
      font-weight: 700;
      letter-spacing: -0.02em;
      text-decoration: underline;
      text-underline-offset: 5px;
      text-decoration-thickness: 2px;
      transition: opacity 0.2s;
      line-height: 1.1;
    }

    .link-item:hover .link-main { opacity: 0.75; }

    .link-item:nth-child(1) .link-main { color: #FFE44D; text-decoration-color: #FFE44D; }
    .link-item:nth-child(2) .link-main { color: #FF5C8A; text-decoration-color: #FF5C8A; }
    .link-item:nth-child(3) .link-main { color: #4DD9FF; text-decoration-color: #4DD9FF; }
    .link-item:nth-child(4) .link-main { color: #B8FF5C; text-decoration-color: #B8FF5C; }
    .link-item:nth-child(5) .link-main { color: #4DD9FF; text-decoration-color: #4DD9FF; }

    .link-sub {
      font-size: 13px;
      font-weight: 300;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.03em;
      text-align: right;
      margin-left: 16px;
      flex-shrink: 0;
      line-height: 1.4;
    }

    /* ── BOTTOM NOTE ── */
    .bottom-note {
      margin-top: 36px;
      font-size: 11px;
      color: rgba(255,255,255,0.25);
      letter-spacing: 0.04em;
      opacity: 0;
      animation: fadeIn 0.6s ease forwards 1.1s;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>

<body>

<canvas id="bg"></canvas>

<div class="page">
  <div class="top">
    <div class="top-eyebrow">You are in the right place</div>
    <div class="clock" id="clock">--:--</div>
    <div class="dateline" id="dateline">Loading...</div>
  </div>

  <div class="bottom-note">No data collected &nbsp;·&nbsp; Information only, not medical advice</div>

  <a href="about.html" style="display:block; text-align:center; margin-top:32px; text-decoration:none; color:rgba(255,255,255,0.7); font-size:16px; font-weight:700; font-family:'Space Grotesk',sans-serif; letter-spacing:0.08em; text-transform:uppercase; transition:color 0.2s;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='rgba(255,255,255,0.7)'">ABOUT US</a>
</div>

<script>
  /* ── CLOCK ── */
  function updateClock() {
    const now = new Date();
    const h = now.getHours();
    const m = String(now.getMinutes()).padStart(2, '0');
    const ampm = h >= 12 ? 'PM' : 'AM';
    const h12 = h % 12 || 12;
    document.getElementById('clock').textContent = `${h12}:${m}${ampm}`;

    const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const d = now.getDate();
    const suffix = d===1||d===21||d===31 ? 'st' : d===2||d===22 ? 'nd' : d===3||d===23 ? 'rd' : 'th';
    document.getElementById('dateline').textContent =
      `${days[now.getDay()]}, ${months[now.getMonth()]} ${d}${suffix}`;
  }
  updateClock();
  setInterval(updateClock, 10000);

  /* ── ANIMATED MESH BACKGROUND ── */
  const canvas = document.getElementById('bg');
  const ctx = canvas.getContext('2d');
  let W, H, points = [];

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
    init();
  }

  function init() {
    points = [];
    const count = Math.floor((W * H) / 9000);
    for (let i = 0; i < count; i++) {
      points.push({
        x: Math.random() * W,
        y: Math.random() * H,
        vx: (Math.random() - 0.5) * 0.25,
        vy: (Math.random() - 0.5) * 0.25,
        r: Math.random() * 1.5 + 0.5,
      });
    }
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);

    for (const p of points) {
      p.x += p.vx;
      p.y += p.vy;
      if (p.x < 0 || p.x > W) p.vx *= -1;
      if (p.y < 0 || p.y > H) p.vy *= -1;
    }

    const maxDist = 120;
    for (let i = 0; i < points.length; i++) {
      for (let j = i + 1; j < points.length; j++) {
        const dx = points[i].x - points[j].x;
        const dy = points[i].y - points[j].y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < maxDist) {
          const alpha = (1 - dist / maxDist) * 0.35;
          ctx.strokeStyle = `rgba(180,200,255,${alpha})`;
          ctx.lineWidth = 0.6;
          ctx.beginPath();
          ctx.moveTo(points[i].x, points[i].y);
          ctx.lineTo(points[j].x, points[j].y);
          ctx.stroke();
        }
      }
    }

    for (const p of points) {
      ctx.fillStyle = 'rgba(200,215,255,0.7)';
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
    }

    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', resize);
  resize();
  draw();
</script>
</body>
</html>
